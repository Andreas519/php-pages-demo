name: Build PHP and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: PHP installieren
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Ausgabeordner erstellen
        run: mkdir -p public

      - name: PHP zu HTML rendern
        run: php index.php > public/index.html

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4